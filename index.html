<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo CDI - Uandes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-dark: #202c44; 
            --bg-light: #f4f6f9; 
            --text-main: #202c44;
            --text-muted: #6c757d;
            --accent-light: #e0e6ed; 
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 0; }

        /* --- HEADER --- */
        .page-header {
            background-color: var(--white);
            padding: 50px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #eaeaea;
        }
        .page-header::before {
            content: ''; position: absolute; background: var(--accent-light);
            width: 250px; height: 250px; border-radius: 50%;
            top: -100px; left: -100px; opacity: 0.4;
        }
        .logo-cdi { max-width: 140px; margin-bottom: 15px; position: relative; z-index: 2; }
        h1.main-title { font-size: 3em; font-weight: 800; color: var(--primary-dark); margin: 10px 0; position: relative; z-index: 2; }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid-ofertas { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .card-oferta {
            background: var(--white); padding: 30px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;
            cursor: pointer; border: 1px solid #f0f0f0; display: flex; flex-direction: column;
        }
        .card-oferta:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .empresa-logo-card { width: 55px; height: 55px; object-fit: contain; border-radius: 10px; border: 1px solid #eee; background: #fff; }
        .empresa-nombre-card { font-weight: 700; font-size: 1.1em; color: var(--text-main); margin: 0; }
        .area-tag-card { font-size: 0.8em; color: var(--primary-dark); background: #eef2f6; padding: 4px 10px; border-radius: 6px; font-weight: 700; margin-top: 5px; display: inline-block; }
        .oportunidad-tipo-card { font-size: 1.3em; font-weight: 800; margin: 15px 0; color: var(--text-main); line-height: 1.2; }
        .ver-detalles-link { color: var(--primary-dark); font-weight: 700; font-size: 0.9em; margin-top: auto; }

        /* --- MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(32, 44, 68, 0.92); z-index: 1000; backdrop-filter: blur(6px);
            overflow-y: auto; padding: 20px;
        }
        .modal-content { background: var(--white); max-width: 850px; margin: 30px auto; padding: 40px; border-radius: 25px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2.5em; color: var(--text-muted); cursor: pointer; border: none; background: none; }
        .modal-header-detail { display: flex; align-items: center; gap: 25px; border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 30px; }
        .empresa-logo-modal { width: 100px; height: 100px; object-fit: contain; border-radius: 15px; border: 1px solid #f0f0f0; }
        .modal-body { display: grid; grid-template-columns: 1.8fr 1fr; gap: 35px; }
        .info-label { font-weight: 800; color: var(--primary-dark); font-size: 0.85em; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .info-text { margin-bottom: 25px; color: #444; white-space: pre-line; line-height: 1.6; }
        .sidebar-info { background: #f8fafc; padding: 25px; border-radius: 20px; align-self: start; }
        .box-postulacion { grid-column: 1 / -1; background: #eefdf3; border: 1px solid #c3e6cb; padding: 30px; border-radius: 20px; margin-top: 15px; }

        @media (max-width: 768px) { .modal-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="page-header">
        <div class="header-content">
            <img src="CDI Logo Color.png" alt="CDI Uandes" class="logo-cdi" onerror="this.style.display='none'">
            <h1 class="main-title">Bolsa de Trabajo<br>Ingeniería Uandes</h1>
            <p style="color: #666;">Plataforma Oficial de Oportunidades 2026</p>
        </div>
    </header>

    <main class="container">
        <div id="grid-ofertas" class="grid-ofertas">
            <p style="text-align: center; grid-column: 1/-1;">Cargando ofertas...</p>
        </div>
    </main>

    <div id="modal-oferta" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal" class="close-modal">&times;</button>
            <div class="modal-header-detail">
                <img id="modal-logo" src="" class="empresa-logo-modal">
                <div>
                    <h2 id="modal-empresa" style="margin:0; color: var(--primary-dark);"></h2>
                    <p id="modal-tipo-oportunidad" style="margin:5px 0; font-weight: 700;"></p>
                </div>
            </div>
            <div class="modal-body">
                <div class="main-col">
                    <span class="info-label">Descripción</span>
                    <p id="modal-descripcion" class="info-text"></p>
                    <span class="info-label">Perfiles y Requisitos</span>
                    <p id="modal-requisitos" class="info-text"></p>
                </div>
                <div class="sidebar-info">
                    <div style="margin-bottom:15px"><span class="info-label">Área</span><span id="modal-area"></span></div>
                    <div style="margin-bottom:15px"><span class="info-label">Modalidad</span><span id="modal-modalidad"></span></div>
                    <div style="margin-bottom:15px"><span class="info-label">Ubicación</span><span id="modal-ubicacion"></span></div>
                </div>
                <div class="box-postulacion">
                    <h4 style="margin:0 0 10px 0; color: #155724;">¿Cómo postular?</h4>
                    <p id="modal-como-postular" style="margin:0; color: #155724;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSwWDw8GNI--K8ZBOH9T0MqalLG2ogne5ihiFCqwiy6rK7HgEH4niXPB53T0cr_U6JgA8Or3LnNqbsO/pub?output=csv';

        // FUNCIÓN MÁGICA: Convierte links de Drive en imágenes reales
        function corregirLinkDrive(url) {
            if (!url || !url.includes('drive.google.com')) return url || 'https://via.placeholder.com/100';
            try {
                const id = url.split('/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}`;
            } catch (e) {
                return url;
            }
        }

        function cargarDatos() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data.filter(f => f.Empresa);
                    const grid = document.getElementById('grid-ofertas');
                    grid.innerHTML = '';
                    data.forEach(o => {
                        const card = document.createElement('div');
                        card.className = 'card-oferta';
                        const imgFixed = corregirLinkDrive(o['Logo']);
                        card.innerHTML = `
                            <div class="card-header">
                                <img src="${imgFixed}" class="empresa-logo-card" onerror="this.src='https://via.placeholder.com/60'">
                                <div><h3 class="empresa-nombre-card">${o.Empresa}</h3><span class="area-tag-card">${o['Área']}</span></div>
                            </div>
                            <h2 class="oportunidad-tipo-card">${o['Tipo oportunidades'] || 'Oferta'}</h2>
                            <div class="ver-detalles-link">Ver detalles →</div>
                        `;
                        card.onclick = () => abrir(o);
                        grid.appendChild(card);
                    });
                }
            });
        }

        function abrir(o) {
            document.getElementById('modal-empresa').innerText = o.Empresa;
            document.getElementById('modal-logo').src = corregirLinkDrive(o['Logo']);
            document.getElementById('modal-tipo-oportunidad').innerText = o['Tipo oportunidades'];
            document.getElementById('modal-descripcion').innerText = o['Descripción'];
            document.getElementById('modal-requisitos').innerText = (o['Perfiles buscados'] || '') + '\n\n' + (o['Requisitos'] || '');
            document.getElementById('modal-area').innerText = o['Área'];
            document.getElementById('modal-modalidad').innerText = o['Modalidad'];
            document.getElementById('modal-ubicacion').innerText = o['Ubicación'];
            document.getElementById('modal-como-postular').innerText = (o['Cómo postular'] || '') + (o['Correo'] ? '\nContacto: ' + o['Correo'] : '');
            
            document.getElementById('modal-oferta').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('close-modal').onclick = () => {
            document.getElementById('modal-oferta').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        cargarDatos();
    </script>
</body>
</html>
