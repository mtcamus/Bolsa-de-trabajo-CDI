<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo CDI | Ingeniería Uandes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .transition-all { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <img src="CDI Logo Color.png" alt="CDI Logo" class="h-12 w-auto">
                    <div class="hidden md:block h-8 w-px bg-slate-200"></div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900 hidden md:block">
                        Bolsa de Trabajo <span class="text-blue-600">Ingeniería</span>
                    </h1>
                </div>
                <div class="flex gap-4">
                    <a href="#" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-all">Uandes.cl</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-slate-100 py-12">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Encuentra tu próximo desafío</h2>
            <p class="text-lg text-slate-600 mb-8">Conectamos el talento de Ingeniería Uandes con las mejores empresas del país.</p>
            
            <div class="flex flex-col md:flex-row gap-3 bg-white p-2 rounded-2xl shadow-xl border border-slate-100">
                <input type="text" id="searchInput" placeholder="¿Qué cargo buscas?" 
                       class="flex-1 px-6 py-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none text-slate-700">
                <select id="filterType" class="px-4 py-3 rounded-xl bg-slate-50 border-none outline-none text-slate-600 font-medium">
                    <option value="todos">Todas las modalidades</option>
                    <option value="presencial">Presencial</option>
                    <option value="remoto">Remoto</option>
                    <option value="hibrido">Híbrido</option>
                </select>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition-all">
                    Buscar
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <div id="ofertas-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-500 font-medium">Cargando oportunidades...</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <img src="CDI Logo Color.png" alt="Logo" class="h-10 mx-auto mb-6 grayscale brightness-200 opacity-50">
            <p class="text-sm">© 2024 Centro de Desarrollo Industrial - Facultad de Ingeniería Uandes</p>
        </div>
    </footer>

    <script>
        // Datos de ejemplo (Esto deberías reemplazarlo por tu fetch a la base de datos o JSON)
        const ofertas = [
            { title: "Ingeniero de Datos", empresa: "Tech Chile", modalidad: "Remoto", area: "TI", link: "#" },
            { title: "Práctica Ingeniería Civil", empresa: "Construcciones S.A.", modalidad: "Presencial", area: "Obras", link: "#" },
            { title: "Analista de Procesos", empresa: "Banco Nacional", modalidad: "Hibrido", area: "Gestión", link: "#" },
            { title: "Desarrollador Fullstack", empresa: "Startup Pro", modalidad: "Remoto", area: "TI", link: "#" },
        ];

        const container = document.getElementById('ofertas-container');

        function renderOfertas(data) {
            container.innerHTML = '';
            data.forEach(job => {
                container.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-2xl p-6 hover-lift transition-all flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-blue-50 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">${job.area}</span>
                                <span class="text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" /></svg></span>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-1 leading-tight">${job.title}</h3>
                            <p class="text-slate-600 font-medium mb-4">${job.empresa}</p>
                            <div class="flex items-center gap-3 text-sm text-slate-500 mb-6">
                                <span class="flex items-center gap-1">📍 Santiago</span>
                                <span class="flex items-center gap-1 font-semibold text-blue-600">💼 ${job.modalidad}</span>
                            </div>
                        </div>
                        <a href="${job.link}" class="block text-center bg-slate-900 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition-all">
                            Ver Postulación
                        </a>
                    </div>
                `;
            });
        }

        // Simular carga inicial
        setTimeout(() => renderOfertas(ofertas), 800);
    </script>
</body>
</html>
